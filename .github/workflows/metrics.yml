name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours
  workflow_dispatch: # Allows manual runs
  push:
    branches:
      - main
      - master

jobs:
  github-metrics-generator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Core Metrics Card
        uses: lowlighter/metrics@latest
        with:
          # This maps your repository secret to the action
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          # 'tokyonight' preset goes inside config_presets
          config_presets: tokyonight

      - name: Generate Top Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes, percentage
          plugin_languages_limit: 8
          config_presets: tokyonight
